services:
  - type: web
    name: zonerush
    env: node
    buildCommand: npm install --prefix server --legacy-peer-deps && npm install --prefix client --legacy-peer-deps && npm run build --prefix client
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zonerush-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: zonerush-db
    plan: free