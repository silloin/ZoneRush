services:
  - type: web
    name: zonerush
    env: node
    region: oregon # Choose your preferred region
    plan: free
    buildCommand: bash build.sh
    startCommand: cd server && npm start
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL should be added manually in Render dashboard from Supabase
      # - DATABASE_URL (add manually from Supabase)
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: zonerush
          property: host
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: zonerush
          property: host
      # Add these manually in Render dashboard:
      # - WEATHER_API_KEY
      # - AQI_API_KEY
      # - GROQ_API_KEY
      # - EMAIL_SERVICE
      # - EMAIL_USER
      # - EMAIL_APP_PASSWORD
      # - MAPBOX_API_KEY

