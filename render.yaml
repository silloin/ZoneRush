services:
  - type: web
    name: zonerush
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zonerush-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: zonerush-db
    plan: free
    postgis: true