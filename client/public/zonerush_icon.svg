<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" />
  
  <!-- Running Person Icon -->
  <g transform="translate(50, 50)">
    <!-- Head -->
    <circle cx="-5" cy="-18" r="7" fill="white" />
    
    <!-- Body -->
    <path d="M -5 -11 L -5 5" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" />
    
    <!-- Arms -->
    <path d="M -5 -5 L -15 -12" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" />
    <path d="M -5 -5 L 8 -15" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" />
    
    <!-- Legs (running pose) -->
    <path d="M -5 5 L -15 18" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M -5 5 L 12 15" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" />
    
    <!-- Speed Lines -->
    <line x1="10" y1="-18" x2="20" y2="-18" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7" />
    <line x1="12" y1="-10" x2="22" y2="-10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5" />
    <line x1="8" y1="-2" x2="18" y2="-2" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3" />
  </g>
</svg>
