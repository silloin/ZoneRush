<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Mapbox Token</title>
</head>
<body>
  <h1>Mapbox Token Test</h1>
  <div id="result"></div>
  
  <script type="module">
    const resultDiv = document.getElementById('result');
    const token = import.meta.env.VITE_MAPBOX_API_KEY;
    
    if (token) {
      resultDiv.innerHTML = `
        <h2 style="color: green;">✅ Token Loaded Successfully!</h2>
        <p><strong>Token:</strong> ${token.substring(0, 20)}...</p>
        <p><strong>Length:</strong> ${token.length} characters</p>
      `;
    } else {
      resultDiv.innerHTML = `
        <h2 style="color: red;">❌ Token NOT Loaded</h2>
        <p>Environment variable VITE_MAPBOX_API_KEY is not set</p>
      `;
    }
  </script>
</body>
</html>
